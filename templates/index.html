<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Stage B5 Manual Annotator</title>
  <style>
    body { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; margin: 24px; }
    fieldset { border: 1px solid #ddd; padding: 16px; border-radius: 12px; max-width: 1265px; }
    legend { font-weight: 700; }
    label { display: block; font-weight: 600; margin-top: 10px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
    .row-spacer { height: 12px; }
    .muted { color: #666; font-size: 13px; }
    .kv { display: grid; grid-template-columns: 180px 1fr; gap: 8px; align-items: center; }
    .pane-section { display: block; }
    .pane-row { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; }
    #manPaneLabelRow { margin-bottom: 6px; }
    .pane-label { display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 1200px; }
    .pane-tip { margin-top: 6px; }
    .btn { padding: 6px 10px; border: 1px solid #444; border-radius: 8px; background: #eee; cursor: pointer; }
    .btn:disabled { opacity: .6; cursor: not-allowed; }
    select, input[type="text"], input[type="number"], input { width: 100%; padding: 6px; border: 1px solid #ccc; border-radius: 6px; }
    pre { background: #111; color: #eee; padding: 12px; border-radius: 8px; white-space: pre-wrap; overflow-x: auto; }
    #manualPlot { width: 100%; height: 540px; border: 1px solid #ddd; border-radius: 8px; margin-top: 10px; }
  </style>
</head>
<body>
  <h1>Stage B5 Manual Annotator</h1>

  <fieldset>
    <legend>B5 Manual Annotator (enriched -> enriched-rep)</legend>

    <div class="row">
      <div class="kv"><label>Enriched folder</label><input id="manEnriched" /></div>
      <div class="kv"><label>Enriched-Rep folder</label><input id="manEnrichedRep" /></div>
    </div>

    <div class="row">
      <div class="kv"><label>File glob</label><input id="manGlob" value="*.xlsx" /></div>
      <div class="kv"><label></label><button id="manScan" class="btn" type="button">Scan</button></div>
    </div>

    <div class="row-spacer"></div>

    <div class="row">
      <div class="kv"><label></label><button id="manNext" class="btn" type="button">Next file</button></div>
      <div class="kv"><label></label><button id="manFinalize" class="btn" type="button" title="Create .done marker so 'Next file' skips this one">Finalize</button></div>
    </div>

    <div class="row-spacer"></div>
    <div class="row-spacer"></div>

    <div class="kv"><label>Current file</label><input id="manFile" readonly /></div>

    <div class="row3">
      <div class="kv"><label></label><button id="manSaveOnly" class="btn" type="button">Save (stay)</button></div>
      <div class="kv"><label></label><button id="manClearResume" class="btn" type="button" title="Clear saved resume state">Clear resume</button></div>
      <div class="kv"><label></label><button id="manResume" class="btn" type="button" title="Resume the last saved B5 manual session (not finalized)">Resume last</button></div>
    </div>

    <div class="kv"><label>Pane</label>
      <div class="pane-section">
        <div id="manPaneLabelRow">
          <span id="manPaneLabel" class="muted pane-label">-</span>
        </div>
        <div id="manPaneButtons" class="pane-row">
          <button id="manPrevPane" class="btn" type="button"><<< Previous pane</button>
          <button id="manNextPane" class="btn" type="button">Next pane >>></button>

          <button id="manModePeak" class="btn" type="button">Peak</button>
          <button id="manModeValley" class="btn" type="button">Valley</button>

          <button id="manReverse" class="btn" type="button" title="Swap peak/valley meaning for THIS pane (for inverted signals)">Reverse</button>

          <button id="manUndo" class="btn" type="button">Undo</button>
          <button id="manReset" class="btn" type="button">Reset</button>
          <button id="manSavePane" class="btn" type="button">Save pane</button>
        </div>
        <div id="manPaneTip" class="muted pane-tip">
          Tip: Use <b>Reverse</b> when the rep waveform is inverted (peaks look like valleys). Applies only to the current pane.
          Hotkeys: <b>P</b>=Peak, <b>V</b>=Valley, <b>Shift+V</b>=Auto-fill, <b>R</b>=Reverse toggle.
        </div>
      </div>
    </div>

    <div id="manualPlot"></div>
    <pre id="manLog"></pre>
  </fieldset>

  <script defer src="/static/plotly-2.26.0.min.js"></script>
  <script src="/static/js/utils.js"></script>
  <script src="/static/js/b5_manual_state.js"></script>
  <script src="/static/js/b5_manual_api.js"></script>
  <script src="/static/js/b5_manual_plot.js"></script>
  <script src="/static/js/b5_manual_ui.js"></script>
</body>
</html>
